aid: workramp
name: WorkRamp
description: WorkRamp is a revenue enablement platform with a REST API for managing
  learning paths, assessments, competencies, coaching, and onboarding programs. The
  API supports enterprise user management, academy contact management, SCORM administration,
  certifications, registrations, webhooks, and SCIM provisioning for go-to-market
  teams.
